name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Regenerate spec vectors
        run: cargo run -p ope-cli -- gen-vectors --dir spec/vectors
      - name: Test
        run: cargo test --all
      - name: Transport official vectors
        run: cargo test -p ope-transport --test official_vectors
      - name: Build FFI for bindings
        run: cargo build -p ope-ffi --release
      - name: Python bindings
        run: |
          pip install -e "bindings/python[dev]"
          pytest bindings/python/tests -q
      - name: Go bindings
        run: cd bindings/go/ope && CGO_ENABLED=1 go test -v .
      - name: TypeScript bindings
        run: cd bindings/ts && npm ci && npm test
